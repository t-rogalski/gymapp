name: gymapp
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Stan i Wstrzykiwanie Zależności (Riverpod 2.x)
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Komunikacja z API (Backend Spring Boot)
  dio: ^5.9.2
  json_annotation: ^4.11.0

  # Routing
  go_router: 17.1.0

  # Bezpieczny Storage (na JWT ze Springa)
  flutter_secure_storage: 10.0.0

  # UI & Utilities
  intl: ^0.20.0
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Generatory kodu (Niezbędne do Riverpoda i JSONów)
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  json_serializable: ^6.13.0

flutter:

  uses-material-design: true

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
